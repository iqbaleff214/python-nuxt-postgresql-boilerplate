<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #1f2937;
    }
    .email-wrapper {
      width: 100%;
      background-color: #f3f4f6;
      padding: 40px 16px;
    }
    .email-card {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
    }
    .email-header {
      background-color: #6366f1;
      padding: 32px 40px;
      text-align: center;
    }
    .email-header .brand {
      color: #ffffff;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-decoration: none;
    }
    .email-body {
      padding: 40px;
    }
    .email-body h1 {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 16px;
      line-height: 1.3;
    }
    .email-body p {
      color: #4b5563;
      margin-bottom: 16px;
      font-size: 15px;
    }
    .email-body p:last-of-type {
      margin-bottom: 0;
    }
    .btn {
      display: inline-block;
      background-color: #6366f1;
      color: #ffffff !important;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      margin: 24px 0;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #4f46e5;
    }
    .btn-center {
      text-align: center;
    }
    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 28px 0;
    }
    .small-text {
      font-size: 13px;
      color: #9ca3af;
    }
    .alert {
      background-color: #fef3c7;
      border-left: 4px solid #f59e0b;
      padding: 12px 16px;
      border-radius: 4px;
      margin: 20px 0;
      font-size: 14px;
      color: #92400e;
    }
    .alert-danger {
      background-color: #fee2e2;
      border-left: 4px solid #ef4444;
      color: #991b1b;
    }
    .code-block {
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 18px;
      letter-spacing: 3px;
      text-align: center;
      color: #111827;
      font-weight: 700;
      margin: 20px 0;
    }
    .email-footer {
      background-color: #f9fafb;
      border-top: 1px solid #e5e7eb;
      padding: 24px 40px;
      text-align: center;
    }
    .email-footer p {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    .email-footer a {
      color: #6366f1;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="email-wrapper">
    <div class="email-card">
      <div class="email-header">
        <span class="brand">{{ app_name }}</span>
      </div>
      <div class="email-body">
        {% block content %}{% endblock %}
      </div>
      <div class="email-footer">
        <p>&copy; {{ current_year | default('2025') }} {{ app_name }}. All rights reserved.</p>
        <p>You received this email because you have an account with {{ app_name }}.</p>
      </div>
    </div>
  </div>
</body>
</html>
